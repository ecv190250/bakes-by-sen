backend:
  name: github
  repo: ecv190250/bakes-by-sen
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "blog"
    label: "Blog"
    folder: "blog"
    create: true
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      # CHANGE THIS LINE BELOW:
      - {label: "Featured Image", name: "image", widget: "image", required: false, path: "images"}
      - {label: "Body", name: "body", widget: "markdown"}
