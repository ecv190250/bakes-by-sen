<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakes by Sen</title>
    
    <meta property="og:title" content="Bakes by Sen">
    <meta property="og:description" content="Handcrafted from scratch, shared with love. A personal baking journal by Erick.">
    <meta property="og:image" content="https://images.unsplash.com/photo-1555507036-ab1f40ce88cb?auto=format&fit=crop&q=80&w=1200">
    <meta property="og:url" content="https://bakes-by-sen.pages.dev/">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #d48a44; --dark: #2c1e16; --light: #fcf9f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--light); color: var(--dark); overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        @keyframes elegantFadeUp {
            0% { opacity: 0; transform: translateY(25px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        header { 
            position: relative;
            background: linear-gradient(rgba(44, 30, 22, 0.75), rgba(44, 30, 22, 0.75)), url('https://images.unsplash.com/photo-1555507036-ab1f40ce88cb?auto=format&fit=crop&q=80&w=2000') center/cover; 
            color: var(--light); 
            padding: 7rem 1rem; 
            text-align: center; 
            width: 100%;
        }
        header h1 { margin: 0; font-size: 4rem; letter-spacing: 2px; animation: elegantFadeUp 1s ease-out forwards; }
        header p { font-size: 1.3rem; font-style: italic; color: var(--primary); margin-top: 15px; opacity: 0; animation: elegantFadeUp 1s ease-out 0.3s forwards; }

        main { max-width: 900px; margin: 0 auto; padding: 4rem 2rem; }
        
        /* ------------------------------------- */
        /* SMART SEARCH BAR STYLING              */
        /* ------------------------------------- */
        .search-wrapper { position: relative; max-width: 100%; margin-bottom: 4rem; animation: elegantFadeUp 1s ease-out 0.5s forwards; opacity: 0; }
        .search-icon { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #999; font-size: 1.2rem; }
        #searchBar { width: 100%; padding: 1.2rem 1.5rem 1.2rem 50px; border: 2px solid transparent; border-radius: 30px; font-size: 1.1rem; font-family: 'Poppins', sans-serif; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        #searchBar:focus { border-color: var(--primary); box-shadow: 0 5px 20px rgba(212, 138, 68, 0.2); }
        
        /* Autocomplete Dropdown */
        .suggestions-box { position: absolute; top: 110%; left: 0; right: 0; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; z-index: 1000; display: none; }
        .suggestion-item { padding: 1rem 1.5rem; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid #f0f0f0; transition: background 0.2s; }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover { background-color: var(--light); color: var(--primary); }
        .suggestion-img { width: 45px; height: 45px; object-fit: cover; border-radius: 8px; }
        .suggestion-title { font-weight: 500; }
        
        /* ------------------------------------- */
        /* RECIPE CARDS                          */
        /* ------------------------------------- */
        .bake-card { background: white; border-radius: 12px; padding: 2.5rem; margin-bottom: 3rem; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-top: 4px solid var(--primary); line-height: 1.7; opacity: 0; animation: elegantFadeUp 1s ease-out 0.8s forwards; }
        .bake-card img { width: 100%; max-height: 450px; object-fit: cover; border-radius: 8px; margin-bottom: 1.5rem; }
        .bake-card h3 { font-size: 2rem; margin-bottom: 1rem; color: var(--dark); }
        .bake-card ul, .bake-card ol { margin-bottom: 1.5rem; margin-left: 1.5rem; }
        .bake-card li { margin-bottom: 0.5rem; }
        
        footer { text-align: center; padding: 3rem 1rem; background: var(--dark); color: var(--light); margin-top: 4rem; }
        .social-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .social-btn { display: flex; align-items: center; justify-content: center; width: 45px; height: 45px; background-color: var(--primary); color: white; border-radius: 50%; text-decoration: none; font-size: 1.2rem; transition: 0.2s; }
        .social-btn:hover { background-color: #fff; color: var(--dark); transform: scale(1.1); }
    </style>
</head>
<body>

    <header>
        <h1>Bakes by Sen</h1>
        <p>Handcrafted from scratch, shared with love.</p>
    </header>

    <main>
        <div class="search-wrapper">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" id="searchBar" placeholder="Search for a recipe or ingredient (e.g., Cake, Vanilla, Cookie)..." autocomplete="off">
            <div id="suggestionsBox" class="suggestions-box"></div>
        </div>

        <div id="posts-container"></div>
    </main>

    <footer>
        <div class="social-row">
            <a href="https://www.facebook.com/ECV190250" target="_blank" class="social-btn"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/senpairikz?utm_source=qr" target="_blank" class="social-btn"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@senpairikz?lang=en" target="_blank" class="social-btn"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.linkedin.com/in/erick-villabroza-55b14a108/" target="_blank" class="social-btn"><i class="fab fa-linkedin-in"></i></a>
        </div>
        <p style="font-size: 0.85rem; opacity: 0.75;">&copy; 2026 Senpairikz. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Global array to hold all recipe data for the smart search
        let globalRecipes = [];
        const searchBar = document.getElementById('searchBar');
        const suggestionsBox = document.getElementById('suggestionsBox');

        async function fetchMyFoodPosts() {
            const container = document.getElementById('posts-container');
            try {
                const response = await fetch(`https://api.github.com/repos/ecv190250/bakes-by-sen/contents/blog`);
                const files = await response.json();
                
                let allPosts = []; 
                
                // 1. Fetch and Parse
                for (const file of files.filter(f => f.name.endsWith('.md'))) {
                    const postRes = await fetch(file.download_url);
                    const text = await postRes.text();
                    const parts = text.split('---');
                    
                    if (parts.length >= 3) {
                        const meta = parts[1];
                        const body = parts.slice(2).join('---');
                        
                        const titleMatch = meta.match(/title:\s*['"]?([^'"\r\n]+)['"]?/);
                        const title = titleMatch ? titleMatch[1].trim() : 'Fresh out of the oven';
                        
                        const imgMatch = meta.match(/image:\s*['"]?([^'"\r\n]+)['"]?/);
                        const img = imgMatch ? imgMatch[1].trim() : '';
                        
                        const dateMatch = meta.match(/date:\s*['"]?(.*?)['"]?\n/);
                        const postDate = dateMatch ? new Date(dateMatch[1]) : new Date(0);
                        
                        allPosts.push({ title, img, body, date: postDate });
                    }
                }
                
                // Sort Newest First
                allPosts.sort((a, b) => b.date - a.date);
                
                // 2. Render to Screen and Save to Global Search
                for (const post of allPosts) {
                    const div = document.createElement('div');
                    div.className = 'bake-card';
                    div.innerHTML = `
                        ${post.img ? `<img src="${post.img}" alt="${post.title}" onerror="this.style.display='none'">` : ''}
                        <h3>${post.title}</h3>
                        <div>${marked.parse(post.body)}</div>
                        <hr style="border: 0; border-top: 1px solid #eee; margin: 2rem 0 1.5rem 0;">
                    `;
                    
                    // Attach Giscus comment block to each post safely
                    const giscusDiv = document.createElement('div');
                    giscusDiv.style.marginTop = "2rem";
                    
                    const giscusScript = document.createElement('script');
                    giscusScript.src = "https://giscus.app/client.js";
                    giscusScript.setAttribute("data-repo", "ecv190250/bakes-by-sen");
                    giscusScript.setAttribute("data-repo-id", "R_kgDOS5FT9g");
                    giscusScript.setAttribute("data-category", "General");
                    giscusScript.setAttribute("data-category-id", "DIC_kwDOS5FT9s4C_Jf-");
                    giscusScript.setAttribute("data-mapping", "specific");
                    giscusScript.setAttribute("data-term", post.title);
                    giscusScript.setAttribute("data-strict", "0");
                    giscusScript.setAttribute("data-reactions-enabled", "1");
                    giscusScript.setAttribute("data-emit-metadata", "0");
                    giscusScript.setAttribute("data-input-position", "bottom");
                    giscusScript.setAttribute("data-theme", "light");
                    giscusScript.setAttribute("data-lang", "en");
                    giscusScript.setAttribute("crossorigin", "anonymous");
                    giscusScript.async = true;
                    
                    giscusDiv.appendChild(giscusScript);
                    div.appendChild(giscusDiv);
                    
                    container.appendChild(div);
                    
                    // Save for search engine
                    globalRecipes.push({ title: post.title, img: post.img, body: post.body, element: div });
                }
                
            } catch (e) { console.error("Error loading recipes:", e); }
        }

        // ------------------------------------- 
        // THE SMART SEARCH ENGINE LOGIC
        // ------------------------------------- 
        searchBar.addEventListener('input', function() {
            const query = this.value.toLowerCase().trim();
            suggestionsBox.innerHTML = '';
            
            if (query === '') {
                suggestionsBox.style.display = 'none';
                globalRecipes.forEach(r => r.element.style.display = 'block'); // Show all if empty
                return;
            }

            // Find matches in Title OR Body
            const matches = globalRecipes.filter(r => 
                r.title.toLowerCase().includes(query) || 
                r.body.toLowerCase().includes(query)
            );

            // Build Dropdown
            if (matches.length > 0) {
                suggestionsBox.style.display = 'block';
                matches.forEach(match => {
                    const item = document.createElement('div');
                    item.className = 'suggestion-item';
                    item.innerHTML = `
                        ${match.img ? `<img src="${match.img}" class="suggestion-img" onerror="this.style.display='none'">` : `<div style="width:45px; height:45px; background:#f0f0f0; border-radius:8px;"></div>`}
                        <span class="suggestion-title">${match.title}</span>
                    `;
                    
                    // When clicked, lock in the search
                    item.onclick = () => {
                        searchBar.value = match.title;
                        suggestionsBox.style.display = 'none';
                        filterDisplayedRecipes(match.title.toLowerCase());
                    };
                    suggestionsBox.appendChild(item);
                });
            } else {
                suggestionsBox.style.display = 'none';
            }

            // Filter the actual big cards on the screen
            filterDisplayedRecipes(query);
        });

        // Hides or shows cards based on the typed query
        function filterDisplayedRecipes(query) {
            globalRecipes.forEach(r => {
                const isMatch = r.title.toLowerCase().includes(query) || r.body.toLowerCase().includes(query);
                r.element.style.display = isMatch ? 'block' : 'none';
            });
        }

        // Close dropdown if user clicks somewhere else on the screen
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-wrapper')) {
                suggestionsBox.style.display = 'none';
            }
        });

        // Start the engine
        fetchMyFoodPosts();
    </script>
</body>
</html>
