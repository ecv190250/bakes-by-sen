<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakes by Sen</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <style>
        :root { --primary: #d48a44; --dark: #2c1e16; --light: #fcf9f6; --accent: #e07a5f; }
        body { font-family: 'Poppins', sans-serif; margin: 0; padding: 0; background-color: var(--light); color: var(--dark); overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        header { position: relative; background: linear-gradient(rgba(44, 30, 22, 0.75), rgba(44, 30, 22, 0.75)), url('https://images.unsplash.com/photo-1555507036-ab1f40ce88cb?auto=format&fit=crop&q=80&w=2000') center/cover; color: var(--light); padding: 7rem 1rem; text-align: center; }
        header h1 { margin: 0; font-size: 4rem; letter-spacing: 2px; }
        .sidebar { position: fixed; top: 0; left: -350px; width: 300px; height: 100vh; background-color: var(--light); padding: 2.5rem; transition: left 0.4s; z-index: 1000; overflow-y: auto; }
        .sidebar.active { left: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.6); opacity: 0; visibility: hidden; transition: 0.4s; z-index: 999; }
        .overlay.active { opacity: 1; visibility: visible; }
        main { max-width: 900px; margin: 0 auto; padding: 4rem 2rem; }
        .bake-card { background: white; border-radius: 12px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-top: 4px solid var(--primary); }
        .bake-card img { width: 100%; max-height: 400px; object-fit: contain; border-radius: 8px; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <header>
        <div class="hamburger-menu" id="menuBtn" style="cursor:pointer; position:absolute; top:25px; left:30px; font-size:2rem;"><i class="fa-solid fa-bars"></i></div>
        <h1>Bakes by Sen</h1>
    </header>

    <div class="sidebar" id="sidebar">
        <div class="close-btn" id="closeBtn" style="cursor:pointer; font-size:1.5rem; text-align:right;"><i class="fa-solid fa-xmark"></i></div>
        <h2>About the Baker</h2>
        <p>Hi, I’m Erick. Baking is my way of connecting with others, and I’m so happy to welcome you to my digital kitchen.</p>
    </div>
    <div class="overlay" id="overlay"></div>

    <main>
        <section id="blog-posts">
            <h2 style="text-align: center; color: var(--primary);">My Baking Journal</h2>
            <div id="posts-container"></div>
        </section>
    </main>

    <script>
        const menuBtn = document.getElementById('menuBtn'), closeBtn = document.getElementById('closeBtn'), sidebar = document.getElementById('sidebar'), overlay = document.getElementById('overlay');
        menuBtn.addEventListener('click', () => { sidebar.classList.add('active'); overlay.classList.add('active'); });
        closeBtn.addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
        overlay.addEventListener('click', () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        async function fetchMyFoodPosts() {
            const container = document.getElementById('posts-container');
            try {
                const githubUsername = 'ecv190250'; 
                const repoName = 'bakes-by-sen';
                const response = await fetch(`https://api.github.com/repos/${githubUsername}/${repoName}/contents/blog`);
                if (!response.ok) throw new Error("Could not fetch");
                const files = await response.json();
                const postFiles = files.filter(f => f.name.endsWith('.md')).reverse();
                
                if (postFiles.length === 0) {
                    container.innerHTML = '<p style="text-align:center;">Whipping up the first recipe...</p>';
                    return;
                }

                for (const file of postFiles) {
                    const postRes = await fetch(file.download_url);
                    const rawText = await postRes.text();
                    const parts = rawText.split('---');
                    if (parts.length >= 3) {
                        const metaData = parts[1];
                        const bodyText = parts.slice(2).join('---').trim();
                        const titleMatch = metaData.match(/title:\s*['"]?(.*?)['"]?\n/);
                        const imageMatch = metaData.match(/image:\s*['"]?(.*?)['"]?\n/);
                        const title = titleMatch ? titleMatch[1] : 'Fresh out of the oven';
                        let image = imageMatch ? imageMatch[1] : '';
                        if(image.startsWith('/')) image = image.substring(1); 
                        
                        const htmlContent = marked.parse(bodyText);
                        
                        container.innerHTML += `
                            <div class="bake-card">
                                ${image ? `<img src="${image}" alt="${title}">` : ''}
                                <h3>${title}</h3>
                                <div>${htmlContent}</div>
                            </div>
                        `;
                    }
                }
            } catch (error) {
                console.error(error);
                container.innerHTML = '<p style="text-align:center;">Could not load posts. Check back soon!</p>';
            }
        }
        fetchMyFoodPosts();
    </script>
</body>
</html>
